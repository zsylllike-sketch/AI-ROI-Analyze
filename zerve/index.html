<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Automation Risk Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      color: #555;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .search-box {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 40px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #dde1ea;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }
    .search-box input:focus { border-color: #4f6ef7; }
    .search-box button {
      padding: 14px 24px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-box button:hover { background: #3a58e0; }
    .search-box button:disabled { background: #a0aec0; cursor: not-allowed; }

    /* ---- status / error ---- */
    #status {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 24px;
      min-height: 20px;
    }
    #error {
      color: #e53e3e;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    /* ---- results ---- */
    #results { width: 100%; max-width: 720px; display: none; flex-direction: column; gap: 20px; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    /* hero score card */
    .score-card {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }
    .score-ring {
      position: relative;
      width: 110px;
      height: 110px;
      flex-shrink: 0;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring .ring-bg { fill: none; stroke: #e8eaf6; stroke-width: 10; }
    .score-ring .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-number { font-size: 1.8rem; font-weight: 800; }
    .score-label  { font-size: 0.65rem; color: #888; letter-spacing: 0.5px; text-transform: uppercase; }

    .score-info h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
    .score-info .occ { font-size: 0.85rem; color: #666; margin-bottom: 12px; }
    .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-low    { background: #d1fae5; color: #065f46; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-high   { background: #fee2e2; color: #991b1b; }

    /* stats row */
    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-box {
      flex: 1;
      min-width: 130px;
      background: #f8f9fc;
      border-radius: 12px;
      padding: 16px;
    }
    .stat-box .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-box .stat-value { font-size: 1.35rem; font-weight: 700; }

    /* task lists */
    .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .task-item:last-child { border-bottom: none; }
    .task-score {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .task-score-high { background: #fee2e2; color: #991b1b; }
    .task-score-low  { background: #d1fae5; color: #065f46; }
    .task-text { font-size: 0.88rem; line-height: 1.5; color: #333; }
    .task-reason { font-size: 0.75rem; color: #999; margin-top: 2px; }
  </style>
</head>
<body>

  <header>
    <h1>AI Automation Risk Analyzer</h1>
    <p>Enter a job title to see its automation risk score, wage data, and task breakdown.</p>
  </header>

  <div class="search-box">
    <input id="jobInput" type="text" placeholder="e.g. Software Engineer, Teacher, Nurse…" />
    <button id="analyzeBtn" onclick="analyze()">Analyze</button>
  </div>

  <div id="status"></div>
  <div id="error"></div>

  <div id="results">

    <!-- Score hero -->
    <div class="card score-card" id="heroCard">
      <div class="score-ring">
        <svg viewBox="0 0 110 110" width="110" height="110">
          <circle class="ring-bg" cx="55" cy="55" r="48"/>
          <circle class="ring-fill" id="ringFill" cx="55" cy="55" r="48"
                  stroke-dasharray="301.6" stroke-dashoffset="301.6"/>
        </svg>
        <div class="score-center">
          <span class="score-number" id="scoreNum">–</span>
          <span class="score-label">Risk</span>
        </div>
      </div>
      <div class="score-info">
        <h2 id="occupationTitle">–</h2>
        <div class="occ" id="onetCode"></div>
        <span class="badge" id="levelBadge">–</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Hourly Wage (CAD)</div>
          <div class="stat-value" id="wage">–</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Monthly ROI</div>
          <div class="stat-value" id="monthlyRoi">–</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Annual ROI</div>
          <div class="stat-value" id="annualRoi">–</div>
        </div>
      </div>
    </div>

    <!-- High-risk tasks -->
    <div class="card">
      <h3>Top Automation-Risk Tasks</h3>
      <div id="topTasks"></div>
    </div>

    <!-- Low-risk tasks -->
    <div class="card">
      <h3>Most Human Tasks</h3>
      <div id="lowTasks"></div>
    </div>

  </div>

  <script>
    const input = document.getElementById("jobInput");
    input.addEventListener("keydown", e => { if (e.key === "Enter") analyze(); });

    function fmt(n, prefix = "") {
      if (n == null) return "N/A";
      return prefix + n.toLocaleString();
    }

    async function analyze() {
      const title = input.value.trim();
      if (!title) { input.focus(); return; }

      const btn = document.getElementById("analyzeBtn");
      const status = document.getElementById("status");
      const errEl = document.getElementById("error");
      const results = document.getElementById("results");

      btn.disabled = true;
      status.textContent = "Analyzing…";
      errEl.textContent = "";
      results.style.display = "none";

      try {
        const res = await fetch("https://risk-api.hub.zerve.cloud/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_title: title })
        });
        const data = await res.json();

        if (!res.ok || !data.found) {
          errEl.textContent = data.detail || "No matching occupation found. Try a different job title.";
          status.textContent = "";
          return;
        }

        populate(data);
        results.style.display = "flex";
        status.textContent = "";

      } catch (e) {
        errEl.textContent = "Request failed. Check your connection and try again.";
        status.textContent = "";
      } finally {
        btn.disabled = false;
      }
    }

    function populate(d) {
      // Ring
      const score = d.risk_score ?? 0;
      const circumference = 2 * Math.PI * 48; // 301.6
      const offset = circumference - (score / 100) * circumference;
      const ring = document.getElementById("ringFill");
      const color = score >= 70 ? "#e53e3e" : score >= 45 ? "#d97706" : "#10b981";
      ring.style.stroke = color;
      // Force reflow so transition fires
      ring.style.strokeDashoffset = circumference;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        ring.style.strokeDashoffset = offset;
      }));

      document.getElementById("scoreNum").textContent = score;
      document.getElementById("scoreNum").style.color = color;

      document.getElementById("occupationTitle").textContent = d.occupation ?? d.query;
      document.getElementById("onetCode").textContent = d.onet_code ? `O*NET: ${d.onet_code}` : "";

      const badge = document.getElementById("levelBadge");
      badge.textContent = d.level ?? "–";
      badge.className = "badge " + (
        score >= 70 ? "badge-high" : score >= 45 ? "badge-medium" : "badge-low"
      );

      document.getElementById("wage").textContent = d.hourly_wage_cad != null ? `$${d.hourly_wage_cad.toFixed(2)}` : "N/A";
      document.getElementById("monthlyRoi").textContent = fmt(d.monthly_roi, "$");
      document.getElementById("annualRoi").textContent = fmt(d.annual_roi, "$");

      // Tasks
      renderTasks("topTasks", d.top_tasks, "task-score-high");
      renderTasks("lowTasks", d.low_tasks, "task-score-low");
    }

    function renderTasks(containerId, tasks, scoreClass) {
      const el = document.getElementById(containerId);
      el.innerHTML = "";
      if (!tasks || !tasks.length) { el.textContent = "No data."; return; }
      tasks.forEach(t => {
        el.innerHTML += `
          <div class="task-item">
            <div class="task-score ${scoreClass}">${Math.round(t.score)}</div>
            <div>
              <div class="task-text">${t.task}</div>
              <div class="task-reason">${t.reason}</div>
            </div>
          </div>`;
      });
    }
  </script>
</body>
</html>
